    <!-- Main -->

        <div>
          <div>Unlock Step</div>
          <small>Watch Ad → wait → Get Link</small>
        </div>
        <strong>Ad</strong>
      </div>

      <div class="bar"><div id="barFill" class="bar-fill"></div></div>

      <div class="btns">
        <button id="watchBtn" class="btn">▶️ Watch Ad</button>
        <button id="getBtn" class="btn secondary">🔓 Get Link</button>

      <!-- ✅ Centered Message -->
      <p id="msg" style="
        display:none;
        margin-top:15px;
        font-weight:700;
        color:#b8ffe9;
        background:rgba(0,255,174,.08);
        padding:10px;
        border-radius:10px;
        text-align:center;

        🎁 Free link + best movie tips — bas ek follow & subscribe Bro ❤️
      </p>

    </div>

  </div>

<script>
const adLink = "https://otieu.com/4/9678202";
const WAIT = 10;

const params = new URLSearchParams(location.search);
const finalLink = params.get("final");

const watchBtn = document.getElementById("watchBtn");
const getBtn = document.getElementById("getBtn");
const timer = document.getElementById("timer");
const msg = document.getElementById("msg");
const barFill = document.getElementById("barFill");

watchBtn.onclick = () => {
  window.open(adLink, "_blank");

  msg.style.display = "block";

  let t = WAIT;
  watchBtn.disabled = true;
  timer.style.display = "block";

  let i = setInterval(()=>{
    t--;
    timer.innerText = "⏳ Please wait... " + t + "s";

    if(t <= 0){
      clearInterval(i);

      getBtn.style.display = "inline-block";
      barFill.style.width = "100%";
      timer.innerText = "🔓 Ready!";
    }
  },1000);
};

getBtn.onclick = () => {
  if(!finalLink){
    alert("Invalid link");
    return;
  }
  location.href = finalLink;
};
</script>
